<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Personal AI Chatbot</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f4; }
        #chat-box { width: 400px; height: 500px; border: 1px solid #ccc; background: white; overflow-y: scroll; padding: 10px; margin-top: 20px; }
        .input-area { margin-top: 10px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Gemini AI Chat</h2>
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            chatBox.innerHTML += `<p><b>You:</b> ${input.value}</p>`;
            
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: input.value })
            });
            const data = await response.json();
            
            chatBox.innerHTML += `<p><b>AI:</b> ${data.reply || data.error}</p>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
